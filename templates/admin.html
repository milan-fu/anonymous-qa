{% extends "base.html" %}
{% block title %}管理员面板 — 匿名提问箱{% endblock %}

{% block content %}
<header class="header admin-header">
    <h1>🔑 管理员面板</h1>
    <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="handleLogout()">退出登录</button>
    </div>
</header>

<nav class="nav-links" style="margin-bottom:16px;">
    <a href="/" class="nav-link" target="_blank">🏠 查看首页</a>
    <a href="javascript:switchTab('questions')" class="nav-link admin-tab active" id="tabQuestions">📬 管理提问箱</a>
    <a href="javascript:switchTab('posts')" class="nav-link admin-tab" id="tabPosts">💬 管理留言箱</a>
</nav>

<!-- ── 管理提问箱 ── -->
<div id="tabQuestionsView">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;" id="statsBar">
        <span class="badge" style="background:#e2e8f0;color:#1a202c;font-size:13px;padding:5px 12px;">📊 全部: <b id="statTotal">...</b></span>
        <span class="badge badge-pending" style="font-size:13px;padding:5px 12px;">⏳ 未回答: <b id="statUnanswered">...</b></span>
        <span class="badge badge-answered" style="font-size:13px;padding:5px 12px;">✅ 已回答: <b id="statAnswered">...</b></span>
        <span class="badge badge-public" style="font-size:13px;padding:5px 12px;">🌐 已公开: <b id="statVisible">...</b></span>
        <button class="btn btn-sm btn-outline" onclick="openPinManager()" style="font-size:12px;">📌 管理置顶</button>
    </div>

    <div class="filter-bar">
        <button class="btn btn-filter active" data-filter="all" onclick="setFilter('all', this)">全部</button>
        <button class="btn btn-filter" data-filter="unanswered" onclick="setFilter('unanswered', this)">⏳ 未回答</button>
        <button class="btn btn-filter" data-filter="answered" onclick="setFilter('answered', this)">✅ 已回答</button>
        <button class="btn btn-filter" data-filter="visible" onclick="setFilter('visible', this)">🌐 已公开</button>
    </div>
</div>

<!-- ── 管理留言箱 ── -->
<div id="tabPostsView" style="display:none;">
    <div style="margin-bottom:16px;">
        <button class="btn btn-primary btn-sm" onclick="openCreatePostModal()">➕ 发起提问</button>
    </div>
</div>

<section class="qa-section">
    <div class="qa-list" id="adminQaList"></div>
    <div class="empty-state" id="adminEmpty" style="display:none;"><p>没有匹配的问题</p></div>
</section>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal modal-wide" id="detailModalContent"></div>
</div>

<!-- 置顶管理弹窗 -->
<div class="modal-overlay" id="pinManagerModal">
    <div class="modal" id="pinManagerContent"></div>
</div>

<!-- 发起提问弹窗 -->
<div class="modal-overlay" id="createPostModal">
    <div class="modal">
        <div class="modal-header">
            <h3>➕ 发起提问</h3>
            <button class="modal-close" onclick="closeCreatePostModal()">&times;</button>
        </div>
        <div class="modal-body">
            <textarea id="postContentInput" placeholder="写下你想问的问题…（不超过200字）" maxlength="200" rows="4"></textarea>
            <div class="char-count"><span id="postCharCount">0</span> / 200</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeCreatePostModal()">取消</button>
            <button class="btn btn-primary" onclick="createPost()">发布提问</button>
        </div>
    </div>
</div>

<!-- 留言详情管理弹窗 -->
<div class="modal-overlay" id="postManageModal">
    <div class="modal modal-wide" id="postManageContent"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
var currentTab = 'questions';
var currentFilter = 'all';
var allQuestions = [];
var allPosts = [];
var fuToParent = {};

function switchTab(tab) {
    currentTab = tab;
    sessionStorage.setItem('adminTab', tab);
    document.querySelectorAll('.admin-tab').forEach(function(el) { el.classList.remove('active'); });
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

    document.getElementById('tabQuestionsView').style.display = tab === 'questions' ? 'block' : 'none';
    document.getElementById('tabPostsView').style.display = tab === 'posts' ? 'block' : 'none';

    if (tab === 'questions') {
        document.getElementById('statsBar').style.display = 'flex';
        document.querySelector('.filter-bar').style.display = 'flex';
        loadQuestions();
        loadStats();
    } else {
        document.getElementById('statsBar').style.display = 'none';
        document.querySelector('.filter-bar').style.display = 'none';
        loadPosts();
    }
}

async function loadStats() {
    try {
        var res = await fetch('/api/admin/stats');
        var data = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statUnanswered').textContent = data.unanswered;
        document.getElementById('statAnswered').textContent = data.answered;
        document.getElementById('statVisible').textContent = data.visible;
    } catch(e) {}
}

async function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.btn-filter').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    await loadQuestions();
}

async function loadQuestions() {
    try {
        var res = await fetch('/api/admin/questions?filter=' + currentFilter);
        if (res.status === 401) { window.location.href = '/admin'; return; }
        allQuestions = await res.json();
        renderList();
    } catch(err) { console.error(err); }
}

function renderList() {
    var list = document.getElementById('adminQaList');
    var empty = document.getElementById('adminEmpty');
    fuToParent = {};
    allQuestions.forEach(function(q) {
        if (q.follow_ups) q.follow_ups.forEach(function(fu) { fuToParent[fu.id] = q.id; });
    });
    if (!allQuestions.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    list.innerHTML = allQuestions.map(function(q) {
        var followUpBadge = '';
        if (q.has_unanswered_followup) {
            followUpBadge = '<span class="badge badge-followup">🔔 有追问</span>';
        }
        var pinBadge = '';
        if (q.is_help) {
            pinBadge = '<span class="badge" style="background:#dbeafe;color:#1e40af;">📖 帮助</span>';
        } else if (q.is_pinned) {
            pinBadge = '<span class="badge badge-pinned">📌 置顶</span>';
        }
        var tagBadge = q.tag ? '<span class="badge" style="background:#e8f5e9;color:#2e7d32;">' + escapeHtml(q.tag) + '</span>' : '';
        return '<div class="qa-card admin-list-item" onclick="openDetail(\'' + q.id + '\')">' +
            '<div class="qa-card-header">' +
                '<div class="admin-card-summary">' +
                    '<span class="admin-ip">📍 ' + escapeHtml(q.asker_ip) + ' · ' + escapeHtml(q.asker_location || '查询中…') + '</span>' +
                    '<span class="admin-time">📅 ' + formatTime(q.created_at) + '</span>' +
                    '<span class="qa-card-question">' + escapeHtml(q.content) + '</span>' +
                '</div>' +
                '<span class="qa-status">' +
                    pinBadge +
                    tagBadge +
                    followUpBadge +
                    (q.is_answered
                        ? '<span class="badge badge-answered">✅ 已回答</span>'
                        : '<span class="badge badge-pending">⏳ 未回答</span>') +
                    (q.is_visible
                        ? '<span class="badge badge-public">🌐 已展示</span>'
                        : '<span class="badge badge-hidden">🙈 未展示</span>') +
                '</span>' +
            '</div>' +
        '</div>';
    }).join('');
}

function openDetail(qid) {
    var q = allQuestions.find(function(x) { return x.id === qid; });
    if (!q) return;

    var followUpsHtml = '';
    if (q.follow_ups && q.follow_ups.length > 0) {
        followUpsHtml = '<div class="follow-ups">' +
            q.follow_ups.map(function(fu) {
                if (!fu.is_answered) {
                    return '<div class="follow-up-item follow-up-unanswered">' +
                        '<div class="follow-up-q">🙋 追问：' + escapeHtml(fu.content) + '</div>' +
                        '<div class="follow-up-time">📅 ' + formatTime(fu.created_at) + '</div>' +
                        '<div class="admin-answer-section">' +
                            '<label class="admin-label">✏️ 回答追问：</label>' +
                            '<textarea class="input admin-answer-input" rows="2" id="fuInput-' + fu.id + '"></textarea>' +
                        '</div>' +
                        '<div class="admin-actions">' +
                            '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + fu.id + '\')">💾 保存回答</button>' +
                        '</div>' +
                        '<p class="admin-action-msg" id="msg-' + fu.id + '"></p>' +
                    '</div>';
                } else {
                    return '<div class="follow-up-item follow-up-answered">' +
                        '<div class="follow-up-q">🙋 追问：' + escapeHtml(fu.content) + '</div>' +
                        '<div class="follow-up-time">📅 ' + formatTime(fu.created_at) + '</div>' +
                        '<div class="answer-display" id="answerDisplay-' + fu.id + '">' +
                            '<div class="follow-up-a">💬 ' + escapeHtml(fu.answer_content) + '</div>' +
                            '<div class="follow-up-ans-time">' + (fu.modified_at ? '📝 最后修改 ' + formatTime(fu.modified_at) : '💬 回答时间 ' + formatTime(fu.answered_at)) + '</div>' +
                            '<button class="btn btn-sm btn-edit" onclick="editFromModal(\'' + fu.id + '\')">✏️ 编辑</button>' +
                        '</div>' +
                        '<div class="answer-edit" id="answerEdit-' + fu.id + '" style="display:none;">' +
                            '<div class="admin-answer-section">' +
                                '<textarea class="input admin-answer-input" rows="2" id="fuEditInput-' + fu.id + '">' + escapeHtml(fu.answer_content) + '</textarea>' +
                            '</div>' +
                            '<div class="admin-actions">' +
                                '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + fu.id + '\')">💾 保存修改</button>' +
                                '<button class="btn btn-secondary btn-sm" onclick="cancelEdit(\'' + fu.id + '\')">取消</button>' +
                            '</div>' +
                        '</div>' +
                        '<p class="admin-action-msg" id="msg-' + fu.id + '"></p>' +
                    '</div>';
                }
            }).join('') +
        '</div>';
    }

    var answerBlock = '';
    if (q.is_answered) {
        answerBlock =
            '<div class="answer-display" id="answerDisplay-' + q.id + '">' +
                '<div class="qa-card-answer">' + escapeHtml(q.answer_content) + '</div>' +
                '<div class="admin-time-info">' +
                    (q.modified_at ? '📝 最后修改 ' + formatTime(q.modified_at) : '💬 回答时间 ' + formatTime(q.answered_at)) +
                '</div>' +
                '<button class="btn btn-sm btn-edit" onclick="editFromModal(\'' + q.id + '\')">✏️ 编辑回答</button>' +
            '</div>' +
            '<div class="answer-edit" id="answerEdit-' + q.id + '" style="display:none;">' +
                '<div class="admin-answer-section">' +
                    '<textarea class="input admin-answer-input" rows="4" id="mainEditInput-' + q.id + '">' + escapeHtml(q.answer_content) + '</textarea>' +
                '</div>' +
                '<div class="admin-actions">' +
                    '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + q.id + '\')">💾 保存修改</button>' +
                    '<button class="btn btn-secondary btn-sm" onclick="cancelEdit(\'' + q.id + '\')">取消</button>' +
                '</div>' +
            '</div>';
    } else {
        answerBlock =
            '<div class="admin-answer-section">' +
                '<label class="admin-label">✏️ 回答：</label>' +
                '<textarea class="input admin-answer-input" rows="4" id="mainInput-' + q.id + '"></textarea>' +
            '</div>' +
            '<div class="admin-actions">' +
                '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + q.id + '\')">💾 保存回答</button>' +
            '</div>';
    }

    var html =
        '<div class="modal-header">' +
            '<h3>📋 问题详情</h3>' +
            '<button class="modal-close" onclick="closeDetail()">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<div class="detail-meta">' +
                '<span>📍 ' + escapeHtml(q.asker_ip) + ' · ' + escapeHtml(q.asker_location || '查询中…') + '</span>' +
                '<span>📅 提问 ' + formatTime(q.created_at) + '</span>' +
                '<span>' +
                    (q.is_answered ? '✅ 已回答' : '⏳ 未回答') +
                    ' · ' + (q.is_visible ? '🌐 已展示' : '🙈 未展示') +
                '</span>' +
            '</div>' +
            '<div class="detail-question">' + escapeHtml(q.content) + '</div>' +
            answerBlock +
            followUpsHtml +
            '<div class="admin-actions" style="flex-wrap:wrap;">' +
                '<input id="tagInput-' + q.id + '" class="input" placeholder="自定义 tag（限10字）" maxlength="10" style="width:130px;padding:4px 8px;font-size:12px;" value="' + escapeHtml(q.tag || '') + '" />' +
                '<button class="btn btn-sm btn-outline" onclick="saveTag(\'' + q.id + '\')">💾 保存 tag</button>' +
                (q.is_help
                    ? '<button class="btn btn-sm btn-outline" onclick="toggleHelp(\'' + q.id + '\')">📖 取消帮助</button>'
                    : '<button class="btn btn-sm btn-outline" onclick="toggleHelp(\'' + q.id + '\')">📖 设为帮助</button>') +
                (q.is_pinned
                    ? '<button class="btn btn-sm btn-outline" onclick="togglePin(\'' + q.id + '\')">📌 取消置顶</button>'
                    : '<button class="btn btn-sm btn-outline" onclick="togglePin(\'' + q.id + '\')">📌 置顶</button>') +
                (q.is_visible
                    ? '<button class="btn btn-secondary btn-sm" onclick="toggleFromModal(\'' + q.id + '\', false)">🙈 隐藏</button>'
                    : '<button class="btn btn-outline btn-sm" onclick="toggleFromModal(\'' + q.id + '\', true)">👁️ 展示</button>') +
                '<button class="btn btn-sm btn-danger" onclick="deleteQuestion(\'' + q.id + '\')">🗑️ 删除</button>' +
            '</div>' +
            '<p class="admin-action-msg" id="msg-' + q.id + '"></p>' +
        '</div>';

    document.getElementById('detailModalContent').innerHTML = html;
    document.getElementById('detailModal').classList.add('active');
}

function closeDetail() {
    document.getElementById('detailModal').classList.remove('active');
}

document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
});

function editFromModal(qid) {
    var display = document.getElementById('answerDisplay-' + qid);
    if (!display) return;
    var answerEl = display.querySelector('.follow-up-a') || display.querySelector('.qa-card-answer');
    var editArea = document.getElementById('answerEdit-' + qid);
    if (!editArea) return;
    var textarea = editArea.querySelector('textarea');
    if (textarea && answerEl) {
        var txt = answerEl.textContent || '';
        txt = txt.replace(/^💬\s*/, '');
        textarea.value = txt;
    }
    display.style.display = 'none';
    editArea.style.display = 'block';
}

function cancelEdit(qid) {
    var editArea = document.getElementById('answerEdit-' + qid);
    if (!editArea) return;
    var display = document.getElementById('answerDisplay-' + qid);
    if (display) {
        var answerEl = display.querySelector('.follow-up-a') || display.querySelector('.qa-card-answer');
        var textarea = editArea.querySelector('textarea');
        if (textarea && answerEl) {
            var txt = answerEl.textContent || '';
            txt = txt.replace(/^💬\s*/, '');
            textarea.value = txt;
        }
    }
    editArea.style.display = 'none';
    if (display) display.style.display = 'block';
}

async function saveFromModal(qid) {
    var textarea = document.getElementById('mainInput-' + qid)
                || document.getElementById('fuInput-' + qid)
                || document.getElementById('mainEditInput-' + qid)
                || document.getElementById('fuEditInput-' + qid);
    if (!textarea) return;
    var answerContent = textarea.value.trim();
    var msgEl = document.getElementById('msg-' + qid);
    if (!answerContent) { msgEl.textContent = '回答不能为空'; msgEl.className = 'admin-action-msg error'; return; }
    try {
        var res = await fetch('/api/admin/questions/' + qid, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer_content: answerContent })
        });
        if (res.ok) {
            await loadQuestions();
            await loadStats();
            var parentId = fuToParent[qid] || qid;
            openDetail(parentId);
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

async function toggleFromModal(qid, makeVisible) {
    try {
        var res = await fetch('/api/admin/questions/' + qid, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_visible: makeVisible })
        });
        if (res.ok) {
            await loadQuestions();
            openDetail(qid);
        }
    } catch(err) {}
}

function formatTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    var pad = function(n) { return n < 10 ? '0' + n : n; };
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

async function handleLogout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/admin';
}

// ── 删除 ────────────────────────────────────────────

async function deleteQuestion(qid) {
    if (!confirm('确定要删除这个问题吗？追问也会被一并删除，此操作不可撤销！')) return;
    try {
        var res = await fetch('/api/admin/questions/' + qid, { method: 'DELETE' });
        if (res.ok) {
            closeDetail();
            await loadQuestions();
            await loadStats();
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

// ── 置顶 ────────────────────────────────────────────

async function togglePin(qid) {
    try {
        var res = await fetch('/api/admin/questions/' + qid + '/pin', { method: 'POST' });
        if (res.ok) {
            await loadQuestions();
            await loadStats();
            openDetail(qid);
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

function openPinManager() {
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    if (!pinned.length) {
        var html =
            '<div class="modal-header">' +
                '<h3>📌 管理置顶</h3>' +
                '<button class="modal-close" onclick="closePinManager()">&times;</button>' +
            '</div>' +
            '<div class="modal-body">' +
                '<p style="text-align:center;color:var(--color-text-secondary);padding:20px;">暂无置顶问题</p>' +
            '</div>';
        document.getElementById('pinManagerContent').innerHTML = html;
        document.getElementById('pinManagerModal').classList.add('active');
        return;
    }

    var itemsHtml = pinned.map(function(q, i) {
        return '<div class="pin-manage-item" draggable="true" ' +
            'ondragstart="pinDragStart(event, ' + i + ')" ' +
            'ondragover="pinDragOver(event)" ' +
            'ondragleave="pinDragLeave(event)" ' +
            'ondrop="pinDrop(event, ' + i + ')" ' +
            'ondragend="pinDragEnd(event)">' +
            '<span class="pin-drag-handle">⋮⋮</span>' +
            '<span style="font-weight:700;color:var(--color-text-secondary);flex-shrink:0;">#' + (i + 1) + '</span>' +
            '<span class="pin-info">' + escapeHtml(q.content) + '</span>' +
        '</div>';
    }).join('');

    var html =
        '<div class="modal-header">' +
            '<h3>📌 管理置顶（共 ' + pinned.length + ' 个）</h3>' +
            '<button class="modal-close" onclick="closePinManager()">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;">拖拽条目调整顺序，点击保存生效</p>' +
            '<div id="pinManageList">' + itemsHtml + '</div>' +
        '</div>' +
        '<div class="modal-footer">' +
            '<button class="btn btn-secondary" onclick="closePinManager()">取消</button>' +
            '<button class="btn btn-primary" onclick="savePinOrder()">💾 保存顺序</button>' +
        '</div>';
    document.getElementById('pinManagerContent').innerHTML = html;
    document.getElementById('pinManagerModal').classList.add('active');
}

function closePinManager() {
    document.getElementById('pinManagerModal').classList.remove('active');
    loadQuestions();
}

document.getElementById('pinManagerModal').addEventListener('click', function(e) {
    if (e.target === this) closePinManager();
});

// ── 拖拽排序 ──────────────────────────────────────

var pinDragIndex = -1;

function pinDragStart(e, idx) {
    pinDragIndex = idx;
    e.target.classList.add('pin-dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
}

function pinDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('pin-drag-over');
}

function pinDragLeave(e) {
    e.currentTarget.classList.remove('pin-drag-over');
}

function pinDrop(e, targetIdx) {
    e.preventDefault();
    e.currentTarget.classList.remove('pin-drag-over');
    if (pinDragIndex < 0 || pinDragIndex === targetIdx) return;

    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    var item = pinned.splice(pinDragIndex, 1)[0];
    pinned.splice(targetIdx, 0, item);

    var unpinned = allQuestions.filter(function(q) { return !q.is_pinned; });
    allQuestions = pinned.concat(unpinned);

    pinDragIndex = -1;
    refreshPinList();
}

function pinDragEnd(e) {
    e.target.classList.remove('pin-dragging');
    document.querySelectorAll('.pin-drag-over').forEach(function(el) { el.classList.remove('pin-drag-over'); });
    pinDragIndex = -1;
}

function refreshPinList() {
    var container = document.getElementById('pinManageList');
    if (!container) return;
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    container.innerHTML = pinned.map(function(q, i) {
        return '<div class="pin-manage-item" draggable="true" ' +
            'ondragstart="pinDragStart(event, ' + i + ')" ' +
            'ondragover="pinDragOver(event)" ' +
            'ondragleave="pinDragLeave(event)" ' +
            'ondrop="pinDrop(event, ' + i + ')" ' +
            'ondragend="pinDragEnd(event)">' +
            '<span class="pin-drag-handle">⋮⋮</span>' +
            '<span style="font-weight:700;color:var(--color-text-secondary);flex-shrink:0;">#' + (i + 1) + '</span>' +
            '<span class="pin-info">' + escapeHtml(q.content) + '</span>' +
        '</div>';
    }).join('');
    var h3 = document.querySelector('#pinManagerContent .modal-header h3');
    if (h3) h3.textContent = '📌 管理置顶（共 ' + pinned.length + ' 个）';
}

async function savePinOrder() {
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    var ids = pinned.map(function(q) { return q.id; });
    try {
        var res = await fetch('/api/admin/pins/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: ids })
        });
        if (res.ok) {
            closePinManager();
            await loadQuestions();
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

// ── 管理员留言管理 ──────────────────────────────────

async function loadPosts() {
    try {
        var res = await fetch('/api/admin/posts');
        if (res.status === 401) { window.location.href = '/admin'; return; }
        allPosts = await res.json();
        renderPostList();
    } catch(err) { console.error(err); }
}

function renderPostList() {
    var list = document.getElementById('adminQaList');
    var empty = document.getElementById('adminEmpty');
    if (!allPosts.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        empty.querySelector('p').textContent = '还没有发起过提问';
        return;
    }
    empty.style.display = 'none';

    list.innerHTML = allPosts.map(function(p) {
        var pinBadge = '';
        if (p.is_help) {
            pinBadge = '<span class="badge" style="background:#dbeafe;color:#1e40af;">📖 帮助</span>';
        } else if (p.is_pinned) {
            pinBadge = '<span class="badge badge-pinned">📌 置顶</span>';
        }
        var tagBadge = p.tag ? '<span class="badge" style="background:#e8f5e9;color:#2e7d32;">' + escapeHtml(p.tag) + '</span>' : '';
        return '<div class="qa-card admin-list-item" onclick="openPostManage(\'' + p.id + '\')">' +
            '<div class="qa-card-header">' +
                '<div class="admin-card-summary">' +
                    '<span class="admin-time">📅 ' + formatTime(p.created_at) + '</span>' +
                    '<span class="qa-card-question">📢 ' + escapeHtml(p.content) + '</span>' +
                '</div>' +
                '<span class="qa-status">' +
                    pinBadge +
                    tagBadge +
                    (p.is_closed ? '<span class="badge badge-hidden">🔒 已关闭</span>' : '') +
                    '<span class="badge badge-answered">💬 ' + p.answer_count + ' 条留言</span>' +
                '</span>' +
            '</div>' +
        '</div>';
    }).join('');
}

function openPostManage(pid) {
    var p = allPosts.find(function(x) { return x.id === pid; });
    if (!p) return;

    var answersHtml = '';
    if (p.answers && p.answers.length > 0) {
        answersHtml = '<div class="follow-ups">' +
            p.answers.map(function(a) {
                var hiddenClass = a.is_visible ? '' : ' hidden-answer';
                var adminClass = a.is_admin_answer ? ' admin-answer' : '';
                var ipInfo = a.is_admin_answer ? '管理员' : ('📍 ' + escapeHtml(a.asker_ip || '?') + ' · ' + escapeHtml(a.asker_location || ''));
                var nick = a.nickname ? escapeHtml(a.nickname) : (a.is_admin_answer ? '管理员' : '匿名用户');
                return '<div class="answer-manage-item' + hiddenClass + adminClass + '">' +
                    (a.is_pinned ? '<span class="pin-badge" style="font-size:10px;">📌 置顶</span>' : '') +
                    '<div class="answer-text">' + escapeHtml(a.content) + '</div>' +
                    '<div class="answer-meta-row">' +
                        '<span>' + nick + '</span>' +
                        '<span>' + ipInfo + '</span>' +
                        '<span>📅 ' + formatTime(a.created_at) + '</span>' +
                        '<span class="answer-actions">' +
                            '<button class="btn btn-sm ' + (a.is_pinned ? 'btn-secondary' : 'btn-outline') + '" onclick="event.stopPropagation();toggleAnswerPin(\'' + a.id + '\', \'' + pid + '\')" style="font-size:11px;">' +
                                (a.is_pinned ? '📌 取消置顶' : '📌 置顶') +
                            '</button>' +
                            '<button class="btn btn-sm ' + (a.is_visible ? 'btn-secondary' : 'btn-outline') + '" onclick="event.stopPropagation();toggleAnswerVis(\'' + a.id + '\', \'' + pid + '\')">' +
                                (a.is_visible ? '🙈 隐藏' : '👁️ 展示') +
                            '</button>' +
                            '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteAnswer(\'' + a.id + '\', \'' + pid + '\')">🗑️</button>' +
                        '</span>' +
                    '</div>' +
                '</div>';
            }).join('') +
        '</div>';
    } else {
        answersHtml = '<p style="padding:0 20px;color:var(--color-text-secondary);">暂无留言</p>';
    }

    var html =
        '<div class="modal-header">' +
            '<h3>📢 ' + escapeHtml(p.content) + '</h3>' +
            '<button class="modal-close" onclick="closePostManage()">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<div class="detail-meta">' +
                '<span>📅 提问 ' + formatTime(p.created_at) + '</span>' +
                '<span>💬 ' + p.answer_count + ' 条留言</span>' +
                (p.is_closed ? '<span>🔒 已关闭留言</span>' : '') +
            '</div>' +
            answersHtml +
            '<div style="margin:0 20px;padding:12px;background:#fdf2f8;border-radius:8px;border:1px solid #fbcfe8;">' +
                '<p style="font-size:12px;color:#9d174d;margin-bottom:8px;">👑 以管理员身份留言</p>' +
                '<textarea id="adminAnswerInput" class="input" placeholder="写下留言…（不超过200字）" maxlength="200" rows="2" style="font-size:13px;min-height:50px;"></textarea>' +
                '<div style="display:flex;gap:8px;margin-top:6px;">' +
                    '<input id="adminNickInput" class="input" placeholder="昵称（选填）" maxlength="20" style="flex:1;padding:6px 10px;font-size:12px;" />' +
                    '<button class="btn btn-sm btn-primary" onclick="submitAdminAnswer(\'' + p.id + '\')">💾 提交</button>' +
                '</div>' +
            '</div>' +
            '<div class="admin-actions" style="margin-top:12px;flex-wrap:wrap;">' +
                '<input id="tagInput-' + p.id + '" class="input" placeholder="自定义 tag（限10字）" maxlength="10" style="width:130px;padding:4px 8px;font-size:12px;" value="' + escapeHtml(p.tag || '') + '" />' +
                '<button class="btn btn-sm btn-outline" onclick="saveTag(\'' + p.id + '\')">💾 保存 tag</button>' +
                '<button class="btn btn-sm ' + (p.is_help ? 'btn-secondary' : 'btn-outline') + '" onclick="toggleHelp(\'' + p.id + '\')">' +
                    (p.is_help ? '📖 取消帮助' : '📖 设为帮助') +
                '</button>' +
                '<button class="btn btn-sm ' + (p.is_pinned ? 'btn-secondary' : 'btn-outline') + '" onclick="togglePostPin(\'' + p.id + '\')">' +
                    (p.is_pinned ? '📌 取消置顶' : '📌 置顶') +
                '</button>' +
                '<button class="btn btn-sm ' + (p.is_closed ? 'btn-outline' : 'btn-secondary') + '" onclick="toggleClosePost(\'' + p.id + '\')">' +
                    (p.is_closed ? '🔓 重新开启' : '🔒 关闭留言') +
                '</button>' +
                '<button class="btn btn-sm btn-danger" onclick="deletePost(\'' + p.id + '\')">🗑️ 删除此提问</button>' +
            '</div>' +
        '</div>';
    document.getElementById('postManageContent').innerHTML = html;
    document.getElementById('postManageModal').classList.add('active');
}

function closePostManage() {
    document.getElementById('postManageModal').classList.remove('active');
}

document.getElementById('postManageModal').addEventListener('click', function(e) {
    if (e.target === this) closePostManage();
});

async function toggleAnswerVis(aid, pid) {
    try {
        var res = await fetch('/api/admin/answers/' + aid + '/visibility', { method: 'PUT' });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function toggleAnswerPin(aid, pid) {
    try {
        var res = await fetch('/api/admin/questions/' + aid + '/pin', { method: 'POST' });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function saveTag(qid) {
    var input = document.getElementById('tagInput-' + qid);
    if (!input) return;
    try {
        var res = await fetch('/api/admin/questions/' + qid + '/tag', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag: input.value })
        });
        if (res.ok) {
            if (currentTab === 'posts') { await loadPosts(); openPostManage(qid); }
            else { await loadQuestions(); openDetail(qid); }
        }
    } catch(err) {}
}

async function toggleHelp(qid) {
    try {
        var res = await fetch('/api/admin/questions/' + qid + '/help', { method: 'POST' });
        if (res.ok) {
            // 根据当前 tab 刷新
            if (currentTab === 'posts') { await loadPosts(); } else { await loadQuestions(); await loadStats(); }
            // 重新打开详情
            if (currentTab === 'posts') { openPostManage(qid); } else { openDetail(qid); }
        }
    } catch(err) {}
}

async function togglePostPin(pid) {
    try {
        var res = await fetch('/api/admin/questions/' + pid + '/pin', { method: 'POST' });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function toggleClosePost(pid) {
    try {
        var res = await fetch('/api/admin/posts/' + pid + '/close', { method: 'POST' });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function deleteAnswer(aid, pid) {
    if (!confirm('确定要删除这条留言吗？')) return;
    try {
        var res = await fetch('/api/admin/questions/' + aid, { method: 'DELETE' });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function submitAdminAnswer(pid) {
    var input = document.getElementById('adminAnswerInput');
    var nickInput = document.getElementById('adminNickInput');
    if (!input) return;
    var content = input.value.trim();
    if (!content) { alert('内容不能为空'); return; }
    try {
        var res = await fetch('/api/admin/posts/' + pid + '/admin-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content, nickname: nickInput ? nickInput.value.trim() : '' })
        });
        if (res.ok) {
            await loadPosts();
            openPostManage(pid);
        }
    } catch(err) {}
}

async function deletePost(pid) {
    if (!confirm('确定要删除这个提问吗？所有留言也会被一并删除，此操作不可撤销！')) return;
    try {
        var res = await fetch('/api/admin/posts/' + pid, { method: 'DELETE' });
        if (res.ok) {
            closePostManage();
            await loadPosts();
        }
    } catch(err) {}
}

function openCreatePostModal() {
    document.getElementById('postContentInput').value = '';
    document.getElementById('postCharCount').textContent = '0';
    document.getElementById('createPostModal').classList.add('active');
}

function closeCreatePostModal() {
    document.getElementById('createPostModal').classList.remove('active');
}

document.getElementById('createPostModal').addEventListener('click', function(e) {
    if (e.target === this) closeCreatePostModal();
});

async function createPost() {
    var input = document.getElementById('postContentInput');
    var content = input.value.trim();
    if (!content) { alert('提问内容不能为空'); return; }
    if (content.length > 200) { alert('提问不能超过 200 字'); return; }
    try {
        var res = await fetch('/api/admin/posts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content })
        });
        if (res.ok) {
            closeCreatePostModal();
            await loadPosts();
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

document.addEventListener('DOMContentLoaded', function() {
    var postInput = document.getElementById('postContentInput');
    var postCounter = document.getElementById('postCharCount');
    if (postInput && postCounter) {
        postInput.addEventListener('input', function() {
            postCounter.textContent = this.value.length;
        });
    }
});

// 初始加载 — 记住上次所在的 tab
var savedTab = sessionStorage.getItem('adminTab') || 'questions';
switchTab(savedTab);
</script>
{% endblock %}

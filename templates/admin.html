{% extends "base.html" %}
{% block title %}管理员面板 — 匿名提问箱{% endblock %}

{% block content %}
<header class="header admin-header">
    <h1>🔑 管理员面板</h1>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;" id="statsBar">
        <span class="badge" style="background:#e2e8f0;color:#1a202c;font-size:13px;padding:5px 12px;">📊 全部: <b id="statTotal">...</b></span>
        <span class="badge badge-pending" style="font-size:13px;padding:5px 12px;">⏳ 未回答: <b id="statUnanswered">...</b></span>
        <span class="badge badge-answered" style="font-size:13px;padding:5px 12px;">✅ 已回答: <b id="statAnswered">...</b></span>
        <span class="badge badge-public" style="font-size:13px;padding:5px 12px;">🌐 已公开: <b id="statVisible">...</b></span>
        <button class="btn btn-sm btn-outline" onclick="openPinManager()" style="font-size:12px;">📌 管理置顶</button>
        <button class="btn btn-secondary btn-sm" onclick="handleLogout()">退出登录</button>
    </div>
</header>

<nav class="nav-links">
    <a href="/" class="nav-link" target="_blank">🏠 查看首页</a>
</nav>

<div class="filter-bar">
    <button class="btn btn-filter active" data-filter="all" onclick="setFilter('all', this)">全部</button>
    <button class="btn btn-filter" data-filter="unanswered" onclick="setFilter('unanswered', this)">⏳ 未回答</button>
    <button class="btn btn-filter" data-filter="answered" onclick="setFilter('answered', this)">✅ 已回答</button>
    <button class="btn btn-filter" data-filter="visible" onclick="setFilter('visible', this)">🌐 已公开</button>
</div>

<section class="qa-section">
    <div class="qa-list" id="adminQaList"></div>
    <div class="empty-state" id="adminEmpty" style="display:none;"><p>没有匹配的问题</p></div>
</section>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal modal-wide" id="detailModalContent"></div>
</div>

<!-- 置顶管理弹窗 -->
<div class="modal-overlay" id="pinManagerModal">
    <div class="modal" id="pinManagerContent"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
var currentFilter = 'all';
var allQuestions = [];
var fuToParent = {};  // 追问ID → 父问题ID 映射

async function loadStats() {
    try {
        var res = await fetch('/api/admin/stats');
        var data = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statUnanswered').textContent = data.unanswered;
        document.getElementById('statAnswered').textContent = data.answered;
        document.getElementById('statVisible').textContent = data.visible;
    } catch(e) {}
}

async function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.btn-filter').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    await loadQuestions();
}

async function loadQuestions() {
    try {
        var res = await fetch('/api/admin/questions?filter=' + currentFilter);
        if (res.status === 401) { window.location.href = '/admin'; return; }
        allQuestions = await res.json();
        renderList();
    } catch(err) { console.error(err); }
}

function renderList() {
    var list = document.getElementById('adminQaList');
    var empty = document.getElementById('adminEmpty');
    fuToParent = {};
    allQuestions.forEach(function(q) {
        if (q.follow_ups) q.follow_ups.forEach(function(fu) { fuToParent[fu.id] = q.id; });
    });
    if (!allQuestions.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    list.innerHTML = allQuestions.map(function(q) {
        var followUpBadge = '';
        if (q.has_unanswered_followup) {
            followUpBadge = '<span class="badge badge-followup">🔔 有追问</span>';
        }
        return '<div class="qa-card admin-list-item" onclick="openDetail(\'' + q.id + '\')">' +
            '<div class="qa-card-header">' +
                '<div class="admin-card-summary">' +
                    '<span class="admin-ip">📍 ' + escapeHtml(q.asker_ip) + ' · ' + escapeHtml(q.asker_location || '查询中…') + '</span>' +
                    '<span class="admin-time">📅 ' + formatTime(q.created_at) + '</span>' +
                    '<span class="qa-card-question">' + escapeHtml(q.content) + '</span>' +
                '</div>' +
                '<span class="qa-status">' +
                    (q.is_pinned ? '<span class="badge badge-pinned">📌 置顶</span>' : '') +
                    followUpBadge +
                    (q.is_answered
                        ? '<span class="badge badge-answered">✅ 已回答</span>'
                        : '<span class="badge badge-pending">⏳ 未回答</span>') +
                    (q.is_visible
                        ? '<span class="badge badge-public">🌐 已展示</span>'
                        : '<span class="badge badge-hidden">🙈 未展示</span>') +
                '</span>' +
            '</div>' +
        '</div>';
    }).join('');
}

function openDetail(qid) {
    var q = allQuestions.find(function(x) { return x.id === qid; });
    if (!q) return;

    // 渲染追问
    var followUpsHtml = '';
    if (q.follow_ups && q.follow_ups.length > 0) {
        followUpsHtml = '<div class="follow-ups">' +
            q.follow_ups.map(function(fu) {
                if (!fu.is_answered) {
                    return '<div class="follow-up-item follow-up-unanswered">' +
                        '<div class="follow-up-q">🙋 追问：' + escapeHtml(fu.content) + '</div>' +
                        '<div class="follow-up-time">📅 ' + formatTime(fu.created_at) + '</div>' +
                        '<div class="admin-answer-section">' +
                            '<label class="admin-label">✏️ 回答追问：</label>' +
                            '<textarea class="input admin-answer-input" rows="2" id="fuInput-' + fu.id + '"></textarea>' +
                        '</div>' +
                        '<div class="admin-actions">' +
                            '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + fu.id + '\')">💾 保存回答</button>' +
                        '</div>' +
                        '<p class="admin-action-msg" id="msg-' + fu.id + '"></p>' +
                    '</div>';
                } else {
                    return '<div class="follow-up-item follow-up-answered">' +
                        '<div class="follow-up-q">🙋 追问：' + escapeHtml(fu.content) + '</div>' +
                        '<div class="follow-up-time">📅 ' + formatTime(fu.created_at) + '</div>' +
                        '<div class="answer-display" id="answerDisplay-' + fu.id + '">' +
                            '<div class="follow-up-a">💬 ' + escapeHtml(fu.answer_content) + '</div>' +
                            '<div class="follow-up-ans-time">' + (fu.modified_at ? '📝 最后修改 ' + formatTime(fu.modified_at) : '💬 回答时间 ' + formatTime(fu.answered_at)) + '</div>' +
                            '<button class="btn btn-sm btn-edit" onclick="editFromModal(\'' + fu.id + '\')">✏️ 编辑</button>' +
                        '</div>' +
                        '<div class="answer-edit" id="answerEdit-' + fu.id + '" style="display:none;">' +
                            '<div class="admin-answer-section">' +
                                '<textarea class="input admin-answer-input" rows="2" id="fuEditInput-' + fu.id + '">' + escapeHtml(fu.answer_content) + '</textarea>' +
                            '</div>' +
                            '<div class="admin-actions">' +
                                '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + fu.id + '\')">💾 保存修改</button>' +
                                '<button class="btn btn-secondary btn-sm" onclick="cancelEdit(\'' + fu.id + '\')">取消</button>' +
                            '</div>' +
                        '</div>' +
                        '<p class="admin-action-msg" id="msg-' + fu.id + '"></p>' +
                    '</div>';
                }
            }).join('') +
        '</div>';
    }

    // 渲染主问题
    var answerBlock = '';
    if (q.is_answered) {
        answerBlock =
            '<div class="answer-display" id="answerDisplay-' + q.id + '">' +
                '<div class="qa-card-answer">' + escapeHtml(q.answer_content) + '</div>' +
                '<div class="admin-time-info">' +
                    (q.modified_at ? '📝 最后修改 ' + formatTime(q.modified_at) : '💬 回答时间 ' + formatTime(q.answered_at)) +
                '</div>' +
                '<button class="btn btn-sm btn-edit" onclick="editFromModal(\'' + q.id + '\')">✏️ 编辑回答</button>' +
            '</div>' +
            '<div class="answer-edit" id="answerEdit-' + q.id + '" style="display:none;">' +
                '<div class="admin-answer-section">' +
                    '<textarea class="input admin-answer-input" rows="4" id="mainEditInput-' + q.id + '">' + escapeHtml(q.answer_content) + '</textarea>' +
                '</div>' +
                '<div class="admin-actions">' +
                    '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + q.id + '\')">💾 保存修改</button>' +
                    '<button class="btn btn-secondary btn-sm" onclick="cancelEdit(\'' + q.id + '\')">取消</button>' +
                '</div>' +
            '</div>';
    } else {
        answerBlock =
            '<div class="admin-answer-section">' +
                '<label class="admin-label">✏️ 回答：</label>' +
                '<textarea class="input admin-answer-input" rows="4" id="mainInput-' + q.id + '"></textarea>' +
            '</div>' +
            '<div class="admin-actions">' +
                '<button class="btn btn-primary btn-sm" onclick="saveFromModal(\'' + q.id + '\')">💾 保存回答</button>' +
            '</div>';
    }

    var html =
        '<div class="modal-header">' +
            '<h3>📋 问题详情</h3>' +
            '<button class="modal-close" onclick="closeDetail()">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<div class="detail-meta">' +
                '<span>📍 ' + escapeHtml(q.asker_ip) + ' · ' + escapeHtml(q.asker_location || '查询中…') + '</span>' +
                '<span>📅 提问 ' + formatTime(q.created_at) + '</span>' +
                '<span>' +
                    (q.is_answered ? '✅ 已回答' : '⏳ 未回答') +
                    ' · ' + (q.is_visible ? '🌐 已展示' : '🙈 未展示') +
                '</span>' +
            '</div>' +
            '<div class="detail-question">' + escapeHtml(q.content) + '</div>' +
            answerBlock +
            followUpsHtml +
            '<div class="admin-actions">' +
                (q.is_pinned
                    ? '<button class="btn btn-sm btn-outline" onclick="togglePin(\'' + q.id + '\')">📌 取消置顶</button>'
                    : '<button class="btn btn-sm btn-outline" onclick="togglePin(\'' + q.id + '\')">📌 置顶</button>') +
                (q.is_visible
                    ? '<button class="btn btn-secondary btn-sm" onclick="toggleFromModal(\'' + q.id + '\', false)">🙈 隐藏</button>'
                    : '<button class="btn btn-outline btn-sm" onclick="toggleFromModal(\'' + q.id + '\', true)">👁️ 展示</button>') +
                '<button class="btn btn-sm btn-danger" onclick="deleteQuestion(\'' + q.id + '\')">🗑️ 删除</button>' +
            '</div>' +
            '<p class="admin-action-msg" id="msg-' + q.id + '"></p>' +
        '</div>';

    document.getElementById('detailModalContent').innerHTML = html;
    document.getElementById('detailModal').classList.add('active');
}

function closeDetail() {
    document.getElementById('detailModal').classList.remove('active');
}

document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
});

function editFromModal(qid) {
    // 找到原始答案内容（当前显示中的文本），重置 textarea
    var display = document.getElementById('answerDisplay-' + qid);
    if (!display) return;
    var answerEl = display.querySelector('.follow-up-a') || display.querySelector('.qa-card-answer');
    var editArea = document.getElementById('answerEdit-' + qid);
    if (!editArea) return;
    var textarea = editArea.querySelector('textarea');
    if (textarea && answerEl) {
        // 取纯文本（不包含「💬」前缀）
        var txt = answerEl.textContent || '';
        txt = txt.replace(/^💬\s*/, '');
        textarea.value = txt;
    }
    display.style.display = 'none';
    editArea.style.display = 'block';
}

function cancelEdit(qid) {
    var editArea = document.getElementById('answerEdit-' + qid);
    if (!editArea) return;
    var display = document.getElementById('answerDisplay-' + qid);
    // 重置 textarea 为原始值（从 display 中取）
    if (display) {
        var answerEl = display.querySelector('.follow-up-a') || display.querySelector('.qa-card-answer');
        var textarea = editArea.querySelector('textarea');
        if (textarea && answerEl) {
            var txt = answerEl.textContent || '';
            txt = txt.replace(/^💬\s*/, '');
            textarea.value = txt;
        }
    }
    editArea.style.display = 'none';
    if (display) display.style.display = 'block';
}

async function saveFromModal(qid) {
    var textarea = document.getElementById('mainInput-' + qid)
                || document.getElementById('fuInput-' + qid)
                || document.getElementById('mainEditInput-' + qid)
                || document.getElementById('fuEditInput-' + qid);
    if (!textarea) return;
    var answerContent = textarea.value.trim();
    var msgEl = document.getElementById('msg-' + qid);
    if (!answerContent) { msgEl.textContent = '回答不能为空'; msgEl.className = 'admin-action-msg error'; return; }
    try {
        var res = await fetch('/api/admin/questions/' + qid, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer_content: answerContent })
        });
        if (res.ok) {
            await loadQuestions();
            await loadStats();
            // 追问就跳回父问题，主问题就打开自己
            var parentId = fuToParent[qid] || qid;
            openDetail(parentId);
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

async function toggleFromModal(qid, makeVisible) {
    try {
        var res = await fetch('/api/admin/questions/' + qid, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_visible: makeVisible })
        });
        if (res.ok) {
            await loadQuestions();
            openDetail(qid);
        }
    } catch(err) {}
}

function formatTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    var pad = function(n) { return n < 10 ? '0' + n : n; };
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

async function handleLogout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/admin';
}

// ── 删除 ────────────────────────────────────────────

async function deleteQuestion(qid) {
    if (!confirm('确定要删除这个问题吗？追问也会被一并删除，此操作不可撤销！')) return;
    try {
        var res = await fetch('/api/admin/questions/' + qid, { method: 'DELETE' });
        if (res.ok) {
            closeDetail();
            await loadQuestions();
            await loadStats();
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

// ── 置顶 ────────────────────────────────────────────

async function togglePin(qid) {
    try {
        var res = await fetch('/api/admin/questions/' + qid + '/pin', { method: 'POST' });
        if (res.ok) {
            await loadQuestions();
            await loadStats();
            openDetail(qid);
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

function openPinManager() {
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    if (!pinned.length) {
        var html =
            '<div class="modal-header">' +
                '<h3>📌 管理置顶</h3>' +
                '<button class="modal-close" onclick="closePinManager()">&times;</button>' +
            '</div>' +
            '<div class="modal-body">' +
                '<p style="text-align:center;color:var(--color-text-secondary);padding:20px;">暂无置顶问题</p>' +
            '</div>';
        document.getElementById('pinManagerContent').innerHTML = html;
        document.getElementById('pinManagerModal').classList.add('active');
        return;
    }

    var itemsHtml = pinned.map(function(q, i) {
        return '<div class="pin-manage-item" draggable="true" ' +
            'ondragstart="pinDragStart(event, ' + i + ')" ' +
            'ondragover="pinDragOver(event)" ' +
            'ondragleave="pinDragLeave(event)" ' +
            'ondrop="pinDrop(event, ' + i + ')" ' +
            'ondragend="pinDragEnd(event)">' +
            '<span class="pin-drag-handle">⋮⋮</span>' +
            '<span style="font-weight:700;color:var(--color-text-secondary);flex-shrink:0;">#' + (i + 1) + '</span>' +
            '<span class="pin-info">' + escapeHtml(q.content) + '</span>' +
        '</div>';
    }).join('');

    var html =
        '<div class="modal-header">' +
            '<h3>📌 管理置顶（共 ' + pinned.length + ' 个）</h3>' +
            '<button class="modal-close" onclick="closePinManager()">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
            '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;">拖拽条目调整顺序，点击保存生效</p>' +
            '<div id="pinManageList">' + itemsHtml + '</div>' +
        '</div>' +
        '<div class="modal-footer">' +
            '<button class="btn btn-secondary" onclick="closePinManager()">取消</button>' +
            '<button class="btn btn-primary" onclick="savePinOrder()">💾 保存顺序</button>' +
        '</div>';
    document.getElementById('pinManagerContent').innerHTML = html;
    document.getElementById('pinManagerModal').classList.add('active');
}

function closePinManager() {
    document.getElementById('pinManagerModal').classList.remove('active');
    loadQuestions();  // 从数据库重新加载，丢弃未保存的排序变更
}

document.getElementById('pinManagerModal').addEventListener('click', function(e) {
    if (e.target === this) closePinManager();
});

// ── 拖拽排序 ──────────────────────────────────────

var pinDragIndex = -1;

function pinDragStart(e, idx) {
    pinDragIndex = idx;
    e.target.classList.add('pin-dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
}

function pinDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('pin-drag-over');
}

function pinDragLeave(e) {
    e.currentTarget.classList.remove('pin-drag-over');
}

function pinDrop(e, targetIdx) {
    e.preventDefault();
    e.currentTarget.classList.remove('pin-drag-over');
    if (pinDragIndex < 0 || pinDragIndex === targetIdx) return;

    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    var item = pinned.splice(pinDragIndex, 1)[0];
    pinned.splice(targetIdx, 0, item);

    var unpinned = allQuestions.filter(function(q) { return !q.is_pinned; });
    allQuestions = pinned.concat(unpinned);

    pinDragIndex = -1;
    refreshPinList();
}

function pinDragEnd(e) {
    e.target.classList.remove('pin-dragging');
    document.querySelectorAll('.pin-drag-over').forEach(function(el) { el.classList.remove('pin-drag-over'); });
    pinDragIndex = -1;
}

function refreshPinList() {
    var container = document.getElementById('pinManageList');
    if (!container) return;
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    container.innerHTML = pinned.map(function(q, i) {
        return '<div class="pin-manage-item" draggable="true" ' +
            'ondragstart="pinDragStart(event, ' + i + ')" ' +
            'ondragover="pinDragOver(event)" ' +
            'ondragleave="pinDragLeave(event)" ' +
            'ondrop="pinDrop(event, ' + i + ')" ' +
            'ondragend="pinDragEnd(event)">' +
            '<span class="pin-drag-handle">⋮⋮</span>' +
            '<span style="font-weight:700;color:var(--color-text-secondary);flex-shrink:0;">#' + (i + 1) + '</span>' +
            '<span class="pin-info">' + escapeHtml(q.content) + '</span>' +
        '</div>';
    }).join('');
    var h3 = document.querySelector('#pinManagerContent .modal-header h3');
    if (h3) h3.textContent = '📌 管理置顶（共 ' + pinned.length + ' 个）';
}

async function savePinOrder() {
    var pinned = allQuestions.filter(function(q) { return q.is_pinned; });
    var ids = pinned.map(function(q) { return q.id; });
    try {
        var res = await fetch('/api/admin/pins/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: ids })
        });
        if (res.ok) {
            closePinManager();
            await loadQuestions();
        } else if (res.status === 401) { window.location.href = '/admin'; }
    } catch(err) {}
}

loadQuestions();
loadStats();
</script>
{% endblock %}

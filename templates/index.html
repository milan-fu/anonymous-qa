{% extends "base.html" %}
{% block title %}一个提问箱（测试版）{% endblock %}

{% block content %}

    <h1>一个提问箱（测试版）</h1>
    <p class="subtitle">或许你应该知道你在给谁提问...</p>
</header>


<!-- 双入口 -->
<div class="home-entries">

        <div class="entry-icon">📬</div>

        <div class="entry-desc">给 TA 留言</div>

<div style="position:fixed;bottom:16px;right:20px;font-size:12px;color:var(--color-text-secondary);opacity:0.6;">beta1.0</div>
